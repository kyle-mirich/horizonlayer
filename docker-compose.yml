services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${DOCKER_ENV_FILE:-.env.docker.example}
    ports:
      - "${APP_HOST:-127.0.0.1}:${APP_PORT:-3000}:3000"
    restart: unless-stopped
    volumes:
      - runtime-state-data:/app/runtime-state

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${DB_NAME:-horizon_layer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-horizon_layer}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${DB_HOST:-127.0.0.1}:${DB_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  runtime-state-data:
  postgres-data:
